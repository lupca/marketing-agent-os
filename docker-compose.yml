version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_postgres
    environment:
      POSTGRES_DB: marketing_agent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agent_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agent_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - agent_network

  redis:
    image: redis:7-alpine
    container_name: agent_redis
    ports:
      - "6379:6379"
    networks:
      - agent_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    container_name: agent_celery_worker
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2 -Q rag_ingestion,rag_cascade
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://agent_redis:6379/0
      - DATABASE_URL=postgresql://postgres:secret_password@agent_postgres:5432/marketing_agent_db
      - OLLAMA_HOST=${OLLAMA_HOST:-http://172.22.45.28:11434}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-agent_minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadminpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-agent-uploads}
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - agent_network

volumes:
  pgdata:
  miniodata:

networks:
  agent_network:
    driver: bridge
