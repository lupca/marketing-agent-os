<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Agent OS - Approved Asset Vault</title>
    
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Premium CSS Reset & Glassmorphic Custom Theme */
        :root {
            --bg-base: #0a0a0f;
            --bg-glass: rgba(18, 18, 29, 0.65);
            --bg-glass-hover: rgba(28, 28, 45, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --color-primary: #6366f1; /* Neon Indigo */
            --color-primary-glow: rgba(99, 102, 241, 0.4);
            
            --color-success: #10b981; /* Neon Teal */
            --color-success-glow: rgba(16, 185, 129, 0.4);
            
            --color-warning: #f59e0b; /* Neon Amber */
            
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-family: 'Outfit', sans-serif;
            
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 40%);
        }

        /* Container Layout */
        .vault-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Glassmorphic Panel Style */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1.5rem;
            transition: var(--transition-smooth);
        }
        
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Header Styles */
        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 1.5rem;
        }

        .header-title-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-title-section p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 4px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--color-success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--color-success);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 14px var(--color-success); }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* Controls Section */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 10px var(--color-primary-glow);
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-family);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .chat-nav-btn {
            background: var(--color-primary);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-family);
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 14px var(--color-primary-glow);
            transition: var(--transition-smooth);
            text-decoration: none;
        }

        .chat-nav-btn:hover {
            background: #4f46e5;
            box-shadow: 0 6px 20px var(--color-primary);
            transform: translateY(-1px);
        }

        /* Asset Grid */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 480px) {
            .assets-grid {
                grid-template-columns: 1fr;
            }
        }

        .asset-card {
            background: rgba(18, 18, 29, 0.45);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .asset-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .asset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--color-primary);
        }

        .asset-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.8rem;
        }

        .campaign-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
        }

        .approval-date {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .core-message-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-primary);
        }

        .core-message-text {
            font-size: 0.92rem;
            line-height: 1.4;
            color: var(--text-main);
            background: rgba(99, 102, 241, 0.04);
            padding: 10px;
            border-radius: 8px;
            border-left: 2px solid var(--color-primary);
            font-style: italic;
        }

        /* Platform Tabs */
        .platform-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            cursor: pointer;
            font-family: var(--font-family);
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            transition: var(--transition-smooth);
        }

        .tab-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #ffffff;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .variant-content-area {
            position: relative;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            min-height: 120px;
        }

        .variant-text {
            font-size: 0.85rem;
            line-height: 1.45;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-family: var(--font-family);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .copy-btn:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #ffffff;
        }

        /* Toast message */
        .toast-notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--color-success);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px var(--color-success-glow);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }

        .toast-notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .no-data-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            font-size: 1.1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="vault-container">
        
        <!-- Header -->
        <header class="glass-panel vault-header">
            <div class="header-title-section">
                <h1>🏛️ G-Agent OS - Approved Script Vault</h1>
                <p>Kho lưu trữ kịch bản quảng cáo đã phê duyệt - Sẵn sàng mang đi sản xuất</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="/" class="chat-nav-btn">
                    💬 Quay lại Khung Chat
                </a>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>ONLINE</span>
                </div>
            </div>
        </header>

        <!-- Search and Filters -->
        <section class="glass-panel controls-row">
            <div class="search-box">
                <input type="text" class="search-input" id="search-input" placeholder="🔍 Tìm kiếm nhanh theo tên chiến dịch hoặc từ khóa kịch bản..." oninput="filterCards()">
            </div>
            <button class="refresh-btn" onclick="loadVaultContents()">
                🔄 Tải lại dữ liệu
            </button>
        </section>

        <!-- Script Vault Cards Grid -->
        <section class="assets-grid" id="assets-grid">
            <div class="no-data-msg">Đang tải kịch bản từ kho lưu trữ...</div>
        </section>
        
    </div>

    <!-- Copy Toast -->
    <div class="toast-notification" id="copy-toast">
        📋 Đã sao chép kịch bản vào bộ nhớ tạm!
    </div>

    <script>
        let allAssets = [];

        async function loadVaultContents() {
            const grid = document.getElementById("assets-grid");
            try {
                const response = await fetch("/api/vault/contents");
                const resData = await response.json();
                
                if (resData.status === "success" && resData.data && resData.data.length > 0) {
                    allAssets = resData.data;
                    renderCards(allAssets);
                } else {
                    grid.innerHTML = `<div class="no-data-msg">🏛️ Hiện chưa có kịch bản quảng cáo nào được duyệt để lưu vào kho tài sản.</div>`;
                }
            } catch (error) {
                console.error("Error loading vault contents:", error);
                grid.innerHTML = `<div class="no-data-msg" style="color: #ef4444;">❌ Lỗi kết nối máy chủ: Không thể truy vấn kho lưu trữ dữ liệu.</div>`;
            }
        }

        function renderCards(assets) {
            const grid = document.getElementById("assets-grid");
            grid.innerHTML = "";

            assets.forEach((asset, idx) => {
                const card = document.createElement("div");
                card.className = "asset-card";
                card.id = `card-${asset.id}`;

                // Parse variants
                const variants = asset.variants || [];
                let tabsHTML = "";
                let contentHTML = "";

                if (variants.length > 0) {
                    variants.forEach((v, vIdx) => {
                        const platformUpper = v.platform.toUpperCase();
                        const isActive = vIdx === 0 ? "active" : "";
                        const isHidden = vIdx === 0 ? "" : "display: none;";

                        tabsHTML += `<button class="tab-btn ${isActive}" onclick="switchTab('${asset.id}', ${vIdx}, this)">${platformUpper}</button>`;
                        
                        contentHTML += `
                            <div class="variant-tab-content" id="content-${asset.id}-${vIdx}" style="${isHidden}">
                                <button class="copy-btn" onclick="copyText(this)">Copy 📋</button>
                                <div class="variant-text">${escapeHTML(v.adapted_copy)}</div>
                            </div>
                        `;
                    });
                } else {
                    tabsHTML = `<span style="font-size: 0.8rem; color: var(--text-muted);">Không có thích ứng kênh</span>`;
                    contentHTML = `<div class="variant-text" style="color: var(--text-muted);">Không có bài viết thích ứng nền tảng nào được tìm thấy.</div>`;
                }

                card.innerHTML = `
                    <div class="asset-card-header">
                        <span class="campaign-name">${escapeHTML(asset.campaign_name)}</span>
                        <span class="approval-date">Duyệt: ${asset.created_at || "Không rõ"}</span>
                    </div>
                    
                    <div class="core-message-section">
                        <span class="section-label">Thông điệp cốt lõi (Core Message)</span>
                        <div class="core-message-text">"${escapeHTML(asset.core_message)}"</div>
                    </div>
                    
                    <div class="core-message-section">
                        <span class="section-label">Kịch bản thích ứng</span>
                        <div class="platform-tabs">
                            ${tabsHTML}
                        </div>
                        <div class="variant-content-area">
                            ${contentHTML}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function switchTab(assetId, varIdx, btn) {
            const card = document.getElementById(`card-${assetId}`);
            
            // Deactivate all tab buttons
            const tabButtons = card.querySelectorAll(".tab-btn");
            tabButtons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            // Hide all content areas
            const contents = card.querySelectorAll(".variant-tab-content");
            contents.forEach(c => c.style.display = "none");

            // Show selected content area
            const target = card.querySelector(`#content-${assetId}-${varIdx}`);
            if (target) {
                target.style.display = "block";
            }
        }

        function copyText(btn) {
            const container = btn.parentElement;
            const textElement = container.querySelector(".variant-text");
            if (textElement) {
                navigator.clipboard.writeText(textElement.textContent).then(() => {
                    showToast();
                });
            }
        }

        function showToast() {
            const toast = document.getElementById("copy-toast");
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }

        function filterCards() {
            const query = document.getElementById("search-input").value.toLowerCase();
            const cards = document.querySelectorAll(".asset-card");

            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        function escapeHTML(str) {
            if (!str) return "";
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Auto load on start
        window.addEventListener("DOMContentLoaded", loadVaultContents);
    </script>
</body>
</html>
